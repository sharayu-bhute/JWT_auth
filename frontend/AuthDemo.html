<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JWT Auth Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #11111a;
      --surface2: #1a1a28;
      --border: #2a2a40;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --danger: #ff4d6d;
      --warn: #ffb347;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --success: #00d4aa;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(108,99,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,170,0.05) 0%, transparent 60%);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* FLOW */
    .flow {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 18px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .flow span { color: var(--text); }
    .flow .arrow { color: var(--accent); }

    /* BASE URL */
    .url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .url-label {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    input.url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--accent2);
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input.url-input:focus { border-color: var(--accent); }

    /* TABS */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }
    .tab {
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* TOKEN VAULT */
    .vault {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }
    .vault-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .vault-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.75rem;
      margin-bottom: 4px;
    }
    .vault-row:last-child { margin-bottom: 0; }
    .vault-key { color: var(--muted); min-width: 56px; }
    .vault-val {
      color: var(--accent2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 300px;
    }
    .vault-val.empty { color: var(--border); font-style: italic; }

    /* FORM */
    .form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    input.field-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 9px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input.field-input:focus { border-color: var(--accent); }
    input.field-input::placeholder { color: var(--muted); }

    /* SEND BUTTON */
    .send-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 18px;
    }
    .send-btn:hover { background: #7c75ff; transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }

    /* RESPONSE */
    .response-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .response-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .response-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .badge {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge.idle    { background: #2a2a40; color: var(--muted); }
    .badge.pending { background: rgba(255,179,71,0.15); color: var(--warn); border: 1px solid var(--warn); }
    .badge.success { background: rgba(0,212,170,0.12); color: var(--success); border: 1px solid var(--success); }
    .badge.error   { background: rgba(255,77,109,0.12); color: var(--danger); border: 1px solid var(--danger); }

    pre.response-body {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }
    pre.response-body .key   { color: #a78bfa; }
    pre.response-body .str   { color: var(--accent2); }
    pre.response-body .num   { color: var(--warn); }
    pre.response-body .bool  { color: var(--danger); }
    pre.response-body .null  { color: var(--muted); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <h1>⚡ JWT Auth Demo</h1>

  <!-- FLOW DIAGRAM -->
  <div class="flow">
    <span>Signup</span><span class="arrow">→</span>
    <span>Login</span><span class="arrow">→</span>
    <span>Access Token</span><span class="arrow">→</span>
    <span>Protected</span><span class="arrow">→</span>
    <span>Expire</span><span class="arrow">→</span>
    <span>Refresh</span><span class="arrow">→</span>
    <span>Logout (Blacklist)</span>
  </div>

  <!-- BASE URL -->
  <div class="url-row">
    <span class="url-label">Base URL</span>
    <input class="url-input" id="baseUrl" value="http://localhost:8000" />
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="login">login</button>
    <button class="tab" data-tab="signup">signup</button>
    <button class="tab" data-tab="protected">protected</button>
    <button class="tab" data-tab="admin">admin</button>
    <button class="tab" data-tab="refresh">refresh</button>
    <button class="tab" data-tab="logout">logout</button>
  </div>

  <!-- TOKEN VAULT -->
  <div class="vault">
    <div class="vault-title">🔐 Token Vault</div>
    <div class="vault-row">
      <span class="vault-key">Access</span>
      <span class="vault-val empty" id="accessPreview">— empty —</span>
    </div>
    <div class="vault-row">
      <span class="vault-key">Refresh</span>
      <span class="vault-val empty" id="refreshPreview">— empty —</span>
    </div>
  </div>

  <!-- FORM -->
  <div class="form">
    <div class="field" id="fieldEmail">
      <label class="field-label">Email</label>
      <input class="field-input" id="email" type="email" placeholder="user@example.com" />
    </div>
    <div class="field" id="fieldPassword">
      <label class="field-label">Password</label>
      <input class="field-input" id="password" type="password" placeholder="••••••••" />
    </div>
    <div class="field" id="fieldRefresh" style="display:none;">
      <label class="field-label">Refresh Token</label>
      <input class="field-input" id="refreshInput" placeholder="Paste refresh token..." />
    </div>
  </div>

  <!-- SEND -->
  <button class="send-btn" id="sendBtn">
    ▶ Send Request
  </button>

  <!-- RESPONSE -->
  <div class="response-panel">
    <div class="response-header">
      <span class="response-title">Response</span>
      <span class="badge idle" id="badge">idle</span>
    </div>
    <pre class="response-body" id="responseBody">// waiting for request...</pre>
  </div>

  <script>
    const state = {
      tab: "login",
      tokens: { access: "", refresh: "" }
    };

    // Tab switching
    document.getElementById("tabs").addEventListener("click", e => {
      const btn = e.target.closest(".tab");
      if (!btn) return;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      state.tab = btn.dataset.tab;
      updateFormVisibility();
    });

    function updateFormVisibility() {
      const t = state.tab;
      document.getElementById("fieldEmail").style.display =
        (t === "signup" || t === "login") ? "" : "none";
      document.getElementById("fieldPassword").style.display =
        (t === "signup" || t === "login") ? "" : "none";
      document.getElementById("fieldRefresh").style.display =
        (t === "refresh") ? "" : "none";
    }
    updateFormVisibility();

    // Vault display
    function updateVault() {
      const ap = document.getElementById("accessPreview");
      const rp = document.getElementById("refreshPreview");
      if (state.tokens.access) {
        ap.textContent = state.tokens.access.slice(0, 32) + "...";
        ap.classList.remove("empty");
      } else {
        ap.textContent = "— empty —";
        ap.classList.add("empty");
      }
      if (state.tokens.refresh) {
        rp.textContent = state.tokens.refresh.slice(0, 32) + "...";
        rp.classList.remove("empty");
      } else {
        rp.textContent = "— empty —";
        rp.classList.add("empty");
      }
    }

    // JSON syntax highlight
    function highlight(json) {
      return json
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
          if (/^"/.test(match)) {
            return /:$/.test(match)
              ? `<span class="key">${match}</span>`
              : `<span class="str">${match}</span>`;
          }
          if (/true|false/.test(match)) return `<span class="bool">${match}</span>`;
          if (/null/.test(match)) return `<span class="null">${match}</span>`;
          return `<span class="num">${match}</span>`;
        });
    }

    function setBadge(status) {
      const badge = document.getElementById("badge");
      badge.className = `badge ${status}`;
      badge.textContent = status;
    }

    // Send request
    document.getElementById("sendBtn").addEventListener("click", async () => {
      const baseUrl = document.getElementById("baseUrl").value.replace(/\/$/, "");
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const refreshInput = document.getElementById("refreshInput").value || state.tokens.refresh;
      const t = state.tab;

      let endpoint, method, body = null, auth = false;

      if (t === "signup")    { endpoint = "/signup";    method = "POST"; body = { email, password }; }
      else if (t === "login") { endpoint = "/login";    method = "POST"; body = { email, password }; }
      else if (t === "protected") { endpoint = "/protected"; method = "GET"; auth = true; }
      else if (t === "admin") { endpoint = "/admin";    method = "GET";  auth = true; }
      else if (t === "refresh") { endpoint = "/refresh"; method = "POST"; body = { refresh_token: refreshInput }; }
      else if (t === "logout") {
        endpoint = "/logout";
        method = "POST";
        auth = true;
      }

      setBadge("pending");
      document.getElementById("responseBody").innerHTML = "// loading...";

      try {
        const headers = { "Content-Type": "application/json" };
        if (auth && state.tokens.access) {
          headers["Authorization"] = `Bearer ${state.tokens.access}`;
        }

        const res = await fetch(`${baseUrl}${endpoint}`, {
          method,
          headers,
          body: body ? JSON.stringify(body) : null
        });

        const data = await res.json();

        setBadge(res.ok ? "success" : "error");
        document.getElementById("responseBody").innerHTML = highlight(JSON.stringify(data, null, 2));

        if (t === "login" && res.ok) {
          state.tokens.access = data.access_token || "";
          state.tokens.refresh = data.refresh_token || "";
          updateVault();
        }
        if (t === "refresh" && res.ok) {
          state.tokens.access = data.access_token || "";
          updateVault();
        }

      } catch (err) {
        setBadge("error");
        document.getElementById("responseBody").innerHTML =
          highlight(JSON.stringify({ error: err.message }, null, 2));
      }
    });
  </script>
</body>
</html>
